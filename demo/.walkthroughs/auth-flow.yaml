title: Auth flow overview
description: A short tour of token validation, enrichment, and permission checks.
steps:
  - title: Reading the bearer token
    file: src/auth.ts
    range:
      start: 43
      end: 58
    explanation: |
      `validateToken` accepts either capitalization of the authorization
      header, strips the bearer prefix, and rejects requests that do not map
      to one of the known demo identities.

  - title: Attaching auth state
    file: src/middleware.ts
    range:
      start: 15
      end: 20
    explanation: |
      `attachUser` is still the bridge between request metadata and the rest
      of the pipeline. It returns a copied context object with `user`
      attached for later middleware and handlers.

  - title: Shared auth wrapper
    file: src/middleware.ts
    range:
      start: 35
      end: 55
    explanation: |
      The route handlers do not parse tokens directly. They all go through
      `runAuthenticated`, which enforces the authentication step once and
      standardizes error handling.

  - title: Route-specific permissions
    file: src/middleware.ts
    range:
      start: 58
      end: 65
    explanation: |
      Fine-grained permissions are broken out into helpers so routes can ask
      for admin write access or incident write access without duplicating
      role and scope checks.
