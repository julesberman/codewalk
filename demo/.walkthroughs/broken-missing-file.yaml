title: Broken walkthrough - missing file and out-of-range lines
description: A demo walkthrough that passes YAML parsing but fails semantic validation.
steps:
  - title: Valid opening step
    file: src/routes.ts
    range:
      start: 37
      end: 51
    explanation: |
      The opening step is valid so the document looks like a normal walkthrough
      at first glance.

  - title: Filler middle step
    file: src/middleware.ts
    range:
      start: 35
      end: 55
    explanation: |
      This is a normal filler step between the valid start and the broken
      references later in the file.

  - title: Broken line range
    file: src/audit.ts
    range:
      start: 20
      end: 80
    explanation: |
      `src/audit.ts` only has a few dozen lines in the demo workspace, so this
      range is intentionally out of bounds.

  - title: Another filler step after the bad range
    file: src/projects.ts
    range:
      start: 66
      end: 86
    explanation: |
      This filler step sits between the two semantic failures, though the
      loader should stop at the first broken reference it encounters.

  - title: Missing file reference
    file: src/not-a-real-file.ts
    range:
      start: 1
      end: 12
    explanation: |
      This final step references a file that does not exist so it can be used
      to demonstrate the missing-file validation path.
